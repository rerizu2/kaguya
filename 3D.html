<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Great Sanctuary - Stone Texture & Ultra Volume</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050010; }
        canvas { display: block; }
        #ui {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #ffffff; font-family: serif; font-size: 26px;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #00d4ff;
            pointer-events: none; letter-spacing: 0.6em; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="ui">月詠・石畳の極彩色聖域</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- 設定値 ---
        const WORLD_RADIUS = 450;    
        const STONE_RADIUS = 220;    

        // --- シーン設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050815);
        scene.fog = new THREE.FogExp2(0x0a0515, 0.0018);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 5000);
        camera.position.set(0, 500, 900);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 80, 0);

        // --- ブルーム設定 ---
        const composer = new EffectComposer(renderer);
        composer.addPass(new RenderPass(scene, camera));
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.strength = 1.6; 
        composer.addPass(bloomPass);

        // --- 地面：石畳テクスチャ生成 ---
        function createStoneTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            // 目地
            ctx.fillStyle = '#0a0502'; ctx.fillRect(0, 0, size, size);
            // 石を描画
            const rows = 12; const cols = 12;
            const w = size / cols; const h = size / rows;
            for (let i = 0; i < rows; i++) {
                for (let j = 0; j < cols; j++) {
                    const shade = 25 + Math.random() * 30;
                    ctx.fillStyle = `rgb(${shade+15}, ${shade+5}, ${shade})`;
                    ctx.fillRect(j * w + 2, i * h + 2, w - 4, h - 4);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(12, 12); // 全体で石が細かく見えるように
            return tex;
        }

        // --- 浮遊島コンテナ ---
        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        // 土台と水面
        const diskBase = new THREE.Mesh(new THREE.CylinderGeometry(WORLD_RADIUS, WORLD_RADIUS+20, 120, 64), new THREE.MeshStandardMaterial({color: 0x1a0f08, flatShading: true}));
        diskBase.position.y = -60;
        worldGroup.add(diskBase);

        const water = new THREE.Mesh(new THREE.TorusGeometry((WORLD_RADIUS + STONE_RADIUS)/2, (WORLD_RADIUS - STONE_RADIUS)/2, 2, 64), new THREE.MeshStandardMaterial({color: 0x0044ff, transparent: true, opacity: 0.7, metalness: 0.9, roughness: 0.1}));
        water.rotation.x = -Math.PI / 2; water.position.y = 1;
        worldGroup.add(water);

        // 石の地面 (ここを修正しました)
        const stoneTex = createStoneTexture();
        const stonePlaza = new THREE.Mesh(
            new THREE.CircleGeometry(STONE_RADIUS, 64), 
            new THREE.MeshStandardMaterial({
                map: stoneTex, 
                bumpMap: stoneTex, 
                bumpScale: 0.3, 
                roughness: 0.4
            })
        );
        stonePlaza.rotation.x = -Math.PI / 2; stonePlaza.position.y = 2;
        worldGroup.add(stonePlaza);

        // --- 建物生成 ---
        function createEdoBuilding(x, z, levels, baseWidth = 25) {
            const group = new THREE.Group();
            const floorH = 16;
            for (let i = 0; i < levels; i++) {
                const w = baseWidth - (i * 2.5);
                const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 1, floorH, w + 1), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
                frame.position.y = i * floorH + floorH/2;
                group.add(frame);
                const winMat = new THREE.MeshBasicMaterial({ color: 0xffcc33 });
                for(let side=0; side<4; side++) {
                    const win = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.75, floorH * 0.5), winMat);
                    const angle = (side * Math.PI) / 2;
                    win.position.set(Math.cos(angle)*(w/2+0.6), i*floorH+floorH/2, Math.sin(angle)*(w/2+0.6));
                    win.rotation.y = -angle + Math.PI/2;
                    group.add(win);
                }
                const roof = new THREE.Mesh(new THREE.CylinderGeometry(w*0.1, w*1.4, 5, 4), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
                roof.position.y = (i + 1) * floorH; roof.rotation.y = Math.PI/4;
                group.add(roof);
            }
            group.position.set(x, 2, z);
            worldGroup.add(group);
        }

        createEdoBuilding(0, 0, 8, 40); // 中央大主殿
        for (let i = 0; i < 90; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 35 + Math.random() * (STONE_RADIUS - 70);
            createEdoBuilding(Math.cos(angle)*dist, Math.sin(angle)*dist, Math.floor(Math.random()*5)+1, 15 + Math.random()*10);
        }

        // --- 演出要素 ---
        const bannerColors = [0xff0055, 0xffaa00, 0x00ffcc, 0xaa00ff];
        for(let i=0; i<30; i++) {
            const z = (Math.random()-0.5)*STONE_RADIUS*1.5;
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(-STONE_RADIUS*0.8, 60+Math.random()*40, z),
                new THREE.Vector3(0, 40+Math.random()*30, z + (Math.random()-0.5)*40),
                new THREE.Vector3(STONE_RADIUS*0.8, 60+Math.random()*40, z)
            ]);
            worldGroup.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 32, 0.4, 8), new THREE.MeshStandardMaterial({ color: bannerColors[i%4], emissive: bannerColors[i%4], emissiveIntensity: 0.8 })));
        }

        for(let i=0; i<25; i++) {
            const a = Math.random()*Math.PI*2; const d = 20 + Math.random() * (STONE_RADIUS - 40);
            const tree = new THREE.Group();
            tree.add(new THREE.Mesh(new THREE.CylinderGeometry(1, 2, 20), new THREE.MeshStandardMaterial({color:0x221108})));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(14, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff0066, emissiveIntensity: 1.5 }));
            leaves.position.y = 20; tree.add(leaves);
            tree.position.set(Math.cos(a)*d, 5, Math.sin(a)*d);
            worldGroup.add(tree);
        }

        for(let i=0; i<300; i++) {
            const a = Math.random()*Math.PI*2; const d = Math.random()*STONE_RADIUS;
            const lan = new THREE.Mesh(new THREE.SphereGeometry(1.8, 8, 8), new THREE.MeshBasicMaterial({color: 0xff4400}));
            lan.position.set(Math.cos(a)*d, 30 + Math.random()*120, Math.sin(a)*d);
            worldGroup.add(lan);
        }

        const neonFish = [];
        for(let i=0; i<80; i++) {
            const col = new THREE.Color().setHSL(0.5 + Math.random()*0.1, 1, 0.5);
            const mesh = new THREE.Mesh(new THREE.ConeGeometry(1.2, 5, 3), new THREE.MeshBasicMaterial({color: col}));
            scene.add(mesh);
            neonFish.push({ mesh, angle: Math.random()*Math.PI*2, radius: STONE_RADIUS + 30 + Math.random()*(WORLD_RADIUS-STONE_RADIUS-60), y: 20 + Math.random()*30, speed: 0.004 + Math.random()*0.008 });
        }

        const pCount = 8000;
        const pPos = new Float32Array(pCount * 3);
        const pSpd = new Float32Array(pCount);
        for(let i=0; i<pCount; i++) {
            const a = Math.random()*Math.PI*2; const r = WORLD_RADIUS + Math.random()*5;
            pPos[i*3] = Math.cos(a)*r; pPos[i*3+1] = -Math.random()*400; pPos[i*3+2] = Math.sin(a)*r;
            pSpd[i] = 1.5 + Math.random()*3.5;
        }
        const waterfall = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(pPos,3)), new THREE.PointsMaterial({color: 0x00ffff, size: 3.5, transparent: true, opacity: 0.6}));
        worldGroup.add(waterfall);

        const starPos = [];
        for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000);
        scene.add(new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(starPos,3)), new THREE.PointsMaterial({color:0xffffff, size:2})));
        const moon = new THREE.Mesh(new THREE.SphereGeometry(40, 32, 32), new THREE.MeshBasicMaterial({color: 0xffffff}));
        moon.position.set(400, 800, -800); scene.add(moon);

        scene.add(new THREE.AmbientLight(0x4444ff, 0.5));
        const dLight = new THREE.DirectionalLight(0xffffff, 2);
        dLight.position.set(0, 600, 200); scene.add(dLight);

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            worldGroup.rotation.y += 0.0008;
            worldGroup.position.y = Math.sin(time * 0.4) * 10;
            const pos = waterfall.geometry.attributes.position.array;
            for(let i=0; i<pCount; i++) {
                pos[i*3+1] -= pSpd[i]; if(pos[i*3+1] < -400) pos[i*3+1] = 0;
            }
            waterfall.geometry.attributes.position.needsUpdate = true;
            neonFish.forEach(f => {
                f.angle += f.speed;
                f.mesh.position.set(Math.cos(f.angle)*f.radius, f.y + Math.sin(time + f.angle), Math.sin(f.angle)*f.radius);
                f.mesh.lookAt(0, 100, 0);
            });
            controls.update(); composer.render();
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        });
        animate();
    </script>
</body>
</html>
