<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Floating Sanctuary VR - 月詠</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050510; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #ffffff; font-family: serif; font-size: 20px;
            text-shadow: 0 0 10px #ff00ff;
            pointer-events: none; letter-spacing: 0.3em;
        }
    </style>
</head>
<body>
    <div id="ui">月詠・石畳の聖域 VR</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // --- 設定値 ---
        const WORLD_RADIUS = 400;    
        const STONE_RADIUS = 200;    

        // --- シーン基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050815);
        scene.fog = new THREE.FogExp2(0x0a0515, 0.002);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
        // VRでの立ち位置を石畳の上に設定
        camera.position.set(0, 1.6, 100); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        
        // VR対応設定
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 50, 0);

        // --- 背景: 星と月 ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<3000; i++) starPos.push((Math.random()-0.5)*4000, (Math.random()-0.5)*4000, (Math.random()-0.5)*4000);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 2})));

        const moon = new THREE.Mesh(new THREE.SphereGeometry(35, 32, 32), new THREE.MeshBasicMaterial({color: 0xffffff}));
        moon.position.set(300, 800, -600);
        scene.add(moon);

        // --- 浮遊島コンテナ ---
        const worldGroup = new THREE.Group();
        scene.add(worldGroup);

        // 1. 土台（岩）
        const diskBase = new THREE.Mesh(
            new THREE.CylinderGeometry(WORLD_RADIUS, WORLD_RADIUS + 20, 100, 64),
            new THREE.MeshStandardMaterial({color: 0x221108, flatShading: true})
        );
        diskBase.position.y = -50;
        worldGroup.add(diskBase);

        // 2. 水面
        const water = new THREE.Mesh(
            new THREE.TorusGeometry((WORLD_RADIUS + STONE_RADIUS)/2, (WORLD_RADIUS - STONE_RADIUS)/2, 2, 64),
            new THREE.MeshStandardMaterial({color: 0x0044ff, transparent: true, opacity: 0.7, metalness: 0.9, roughness: 0.1})
        );
        water.rotation.x = -Math.PI / 2;
        water.position.y = 1;
        worldGroup.add(water);

        // 3. 石畳エリア
        function createStoneTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0502'; ctx.fillRect(0, 0, size, size);
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const shade = 25 + Math.random() * 25;
                    ctx.fillStyle = `rgb(${shade+10}, ${shade}, ${shade-5})`;
                    ctx.fillRect(j * 64 + 4, i * 64 + 4, 56, 56);
                }
            }
            return new THREE.CanvasTexture(canvas);
        }
        const stoneTex = createStoneTexture();
        stoneTex.wrapS = stoneTex.wrapT = THREE.RepeatWrapping;
        stoneTex.repeat.set(8, 8);
        const plaza = new THREE.Mesh(
            new THREE.CircleGeometry(STONE_RADIUS, 64),
            new THREE.MeshStandardMaterial({map: stoneTex, roughness: 0.2})
        );
        plaza.rotation.x = -Math.PI / 2;
        plaza.position.y = 2;
        worldGroup.add(plaza);

        // --- 建物生成 ---
        function createEdoBuilding(x, z, levels) {
            const group = new THREE.Group();
            const floorH = 15;
            const width = 25;
            for (let i = 0; i < levels; i++) {
                const w = width - (i * 2.5);
                const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 1, floorH, w + 1), new THREE.MeshStandardMaterial({ color: 0xaa0000 }));
                frame.position.y = i * floorH + floorH/2;
                group.add(frame);
                // VRで光って見えるようemissiveを調整
                const winMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0xffaa00, emissiveIntensity: 2 });
                for(let side=0; side<4; side++) {
                    const win = new THREE.Mesh(new THREE.PlaneGeometry(w * 0.7, floorH * 0.4), winMat);
                    const angle = (side * Math.PI) / 2;
                    win.position.set(Math.cos(angle)*(w/2+0.6), i*floorH+floorH/2, Math.sin(angle)*(w/2+0.6));
                    win.rotation.y = -angle + Math.PI/2;
                    group.add(win);
                }
                const roof = new THREE.Mesh(new THREE.CylinderGeometry(w*0.1, w*1.3, 4, 4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                roof.position.y = (i + 1) * floorH; roof.rotation.y = Math.PI/4;
                group.add(roof);
            }
            group.position.set(x, 2, z);
            worldGroup.add(group);
        }

        for (let i = 0; i < 40; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * (STONE_RADIUS - 30);
            createEdoBuilding(Math.cos(angle)*dist, Math.sin(angle)*dist, Math.floor(Math.random()*3)+1);
        }

        // --- 桜 ---
        function createSakura(x, z) {
            const tree = new THREE.Group();
            tree.add(new THREE.Mesh(new THREE.CylinderGeometry(1, 2, 20), new THREE.MeshStandardMaterial({color:0x221108})));
            const leaves = new THREE.Mesh(new THREE.SphereGeometry(12, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff66aa, emissive: 0xff0066, emissiveIntensity: 1.5 }));
            leaves.position.y = 20;
            tree.add(leaves);
            tree.position.set(x, 5, z);
            worldGroup.add(tree);
        }
        for(let i=0; i<15; i++) {
            const a = Math.random()*Math.PI*2; const d = Math.random() * STONE_RADIUS;
            createSakura(Math.cos(a)*d, Math.sin(a)*d);
        }

        // --- 提灯 ---
        for(let i=0; i<150; i++) {
            const a = Math.random()*Math.PI*2; const d = Math.random()*STONE_RADIUS;
            const lan = new THREE.Mesh(new THREE.SphereGeometry(1.5, 8, 8), new THREE.MeshStandardMaterial({color: 0x000000, emissive: 0xff4400, emissiveIntensity: 3}));
            lan.position.set(Math.cos(a)*d, 35 + Math.random()*30, Math.sin(a)*d);
            worldGroup.add(lan);
        }

        // --- ネオンフィッシュ ---
        const neonFish = [];
        for(let i=0; i<80; i++) {
            const col = new THREE.Color().setHSL(0.5 + Math.random()*0.1, 1, 0.5);
            const mesh = new THREE.Mesh(new THREE.ConeGeometry(1, 4, 3), new THREE.MeshBasicMaterial({color: col}));
            scene.add(mesh);
            neonFish.push({ mesh, angle: Math.random()*Math.PI*2, radius: STONE_RADIUS + 20 + Math.random()*(WORLD_RADIUS-STONE_RADIUS-40), y: 15 + Math.random()*20, speed: 0.005 + Math.random()*0.01 });
        }

        // --- 滝 ---
        const particleCount = 6000;
        const pPositions = new Float32Array(particleCount * 3);
        const pSpeeds = new Float32Array(particleCount);
        for(let i=0; i<particleCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const r = WORLD_RADIUS + Math.random() * 5;
            pPositions[i*3] = Math.cos(angle) * r;
            pPositions[i*3+1] = -Math.random() * 300;
            pPositions[i*3+2] = Math.sin(angle) * r;
            pSpeeds[i] = 1.0 + Math.random() * 3.0;
        }
        const waterfallGeo = new THREE.BufferGeometry();
        waterfallGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        const waterfall = new THREE.Points(waterfallGeo, new THREE.PointsMaterial({color: 0x00ffff, size: 3, transparent: true, opacity: 0.5}));
        worldGroup.add(waterfall);

        // --- ライティング ---
        scene.add(new THREE.AmbientLight(0x4444ff, 0.6));
        const dLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dLight.position.set(0, 500, 100);
        scene.add(dLight);

        // --- アニメーションループ (VR対応) ---
        function animate() {
            const time = Date.now() * 0.001;
            
            // 島のゆっくりとした回転と浮遊
            worldGroup.rotation.y += 0.001;
            worldGroup.position.y = Math.sin(time * 0.5) * 8;

            // 滝のアニメ
            const pos = waterfall.geometry.attributes.position.array;
            for(let i=0; i<particleCount; i++) {
                pos[i*3+1] -= pSpeeds[i];
                if(pos[i*3+1] < -300) pos[i*3+1] = 0;
            }
            waterfall.geometry.attributes.position.needsUpdate = true;

            // 魚のアニメ
            neonFish.forEach(f => {
                f.angle += f.speed;
                f.mesh.position.set(Math.cos(f.angle)*f.radius, f.y + Math.sin(time + f.angle), Math.sin(f.angle)*f.radius);
                f.mesh.lookAt(0, 100, 0);
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // VR用にsetAnimationLoopを使用
        renderer.setAnimationLoop(animate);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
