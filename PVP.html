<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Cyber Action - Infinite Spawn Update</title>
    <style>
        :root { --cyan: #00f2ff; --pink: #ff0066; --green: #00ff88; --dark-bg: rgba(0, 15, 10, 0.9); }
        body { margin: 0; overflow: hidden; background-color: #0b1a0e; font-family: 'Segoe UI', 'Orbitron', sans-serif; touch-action: none; }
        canvas { display: block; }

        /* --- スタート画面 --- */
        #start-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,20,15,0.9) 0%, rgba(0,5,5,1) 100%);
            color: var(--cyan); display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; z-index: 1000; text-shadow: 0 0 15px var(--cyan); text-align: center;
        }

        /* --- 中央大画面マップ --- */
        #map-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vh; height: 70vh; background: var(--dark-bg); border: 3px solid var(--cyan);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5); display: none; z-index: 500;
            clip-path: polygon(5% 0, 95% 0, 100% 5%, 100% 95%, 95% 100%, 5% 100%, 0 95%, 0 5%);
        }
        #map-canvas { width: 100%; height: 100%; }

        /* --- ゲームHUD --- */
        #game-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; color: white; padding: 25px; box-sizing: border-box; }

        .hud-left-top { position: absolute; top: 25px; left: 25px; }
        .diamond-cluster { position: relative; width: 130px; height: 130px; }
        .diamond { position: absolute; background: rgba(0, 20, 15, 0.7); clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: monospace; }
        .diamond.main { width: 70px; height: 70px; top: 25px; left: 25px; border: 3px solid var(--cyan); color: white; font-size: 24px; box-shadow: 0 0 15px var(--cyan); z-index: 5; }
        .diamond.sub-tr { width: 36px; height: 36px; top: 0px; left: 75px; border: 2px solid var(--pink); color: white; font-size: 11px; z-index: 6; }
        .diamond.sub-br { width: 36px; height: 36px; top: 65px; left: 85px; border: 2px solid var(--cyan); color: var(--cyan); font-size: 11px; z-index: 6; }
        .diamond.sub-bl { width: 36px; height: 36px; top: 75px; left: 0px; border: 2px solid var(--pink); color: white; font-size: 11px; z-index: 4; }

        .hud-center-top { position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
        .timer-frame { height: 60px; width: 220px; background: rgba(0, 20, 15, 0.8); border-top: 3px solid var(--cyan); clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); display: flex; align-items: center; justify-content: center; }
        .timer-text { font-size: 34px; font-family: monospace; font-weight: bold; text-shadow: 0 0 10px var(--cyan); }

        .hud-left-bottom { position: absolute; bottom: 35px; left: 30px; display: flex; flex-direction: column; gap: 10px; }
        .status-row { display: flex; align-items: center; gap: 10px; }
        .status-meta { background: rgba(0,0,0,0.5); padding: 2px 8px; transform: skewX(-20deg); border-left: 2px solid white; min-width: 65px; text-align: center;}
        .val-main { font-weight: bold; font-size: 15px; transform: skewX(20deg); font-family: monospace; }
        .bar-outer { width: 190px; height: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); transform: skewX(-20deg); overflow: hidden; }
        .bar-fill { height: 100%; width: 100%; background: var(--pink); box-shadow: 0 0 15px var(--pink); transition: width 0.3s; }

        .hud-right-bottom { position: absolute; bottom: 30px; right: 30px; display: flex; align-items: flex-end; gap: 12px; }
        .weapon-slot { width: 60px; height: 60px; background: rgba(0,20,15,0.7); border: 2px solid rgba(0,242,255,0.2); display: flex; align-items: center; justify-content: center; clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); opacity: 0.6; transition: 0.2s; }
        .weapon-slot.active { border-color: var(--cyan); background: rgba(0,242,255,0.2); opacity: 1; box-shadow: 0 0 15px var(--cyan); transform: scale(1.1); }
        .weapon-slot.cooldown { opacity: 0.2 !important; }
        .item-slot { width: 70px; height: 70px; background: rgba(0,255,136,0.1); border: 2px solid var(--green); clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--green); color: var(--green); }

        #attack-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; opacity: 0; z-index: 600; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--pink); pointer-events: none; opacity: 0; z-index: 600; }
        #recovery-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--green); pointer-events: none; opacity: 0; z-index: 600; transition: opacity 0.5s; }
        #guard-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 150px rgba(0, 242, 255, 0.5); border: 15px solid rgba(0, 242, 255, 0.1); display: none; z-index: 50; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); display: none; }
        #crosshair.attacking { border-color: var(--pink); transform: translate(-50%, -50%) scale(1.5); }

        .enemy-label { position: absolute; transform: translate(-50%, -100%); display: none; text-align: center; }
        .enemy-hp-bar { width: 60px; height: 6px; background: #333; border: 1px solid black; }
        .enemy-hp-fill { height: 100%; width: 100%; background: var(--pink); }
    </style>
</head>
<body>

<div id="start-overlay">
    <h1 style="letter-spacing:8px; font-size: 8vw;">MISSION START</h1>
    <p style="font-size: 3vw; margin-top: 20px;">TAP TO INITIALIZE SYSTEM</p>
    <div style="margin-top: 50px; font-size: 14px; color: #666; line-height: 1.8;">
        LIMIT: 05:00 | ENEMY RESPAWN: EVERY 10s<br>
        ⚔️剣(8m/30点) | 卍手裏剣(10点) | ZL:ガード
    </div>
</div>

<div id="map-container">
    <div style="padding:15px; color:var(--cyan); font-weight:bold;">TACTICAL DATA OVERVIEW</div>
    <canvas id="map-canvas"></canvas>
</div>

<div id="game-hud">
    <div class="hud-center-top"><div class="timer-frame"><div class="timer-text" id="timer-display">05:00</div></div></div>
    <div class="hud-left-top">
        <div class="diamond-cluster">
            <div class="diamond main" id="attack-pwr">124</div>
            <div class="diamond sub-tr">36</div><div class="diamond sub-br">45</div><div class="diamond sub-bl">27</div>
        </div>
    </div>
    <div class="hud-left-bottom">
        <div class="status-row"><div class="status-meta"><div class="val-main" id="hp-text">100</div></div><div class="bar-outer"><div class="bar-fill" id="hp-bar"></div></div></div>
    </div>
    <div class="hud-right-bottom">
        <div class="weapon-slot" id="slot-0"><svg style="width:40px;height:40px;fill:var(--cyan);" viewBox="0 0 100 100"><path d="M50 5 L58 42 L95 50 L58 58 L50 95 L42 58 L5 50 L42 42 Z" /></svg></div>
        <div class="weapon-slot active" id="slot-1">⚔️</div>
        <div class="weapon-slot" id="slot-2">△</div>
        <div class="item-slot"><div style="font-size:24px;">➕</div><div id="item-count" style="font-size:12px; font-weight:bold;">x2</div></div>
    </div>
</div>

<div id="guard-overlay"></div>
<div id="attack-flash"></div>
<div id="damage-flash"></div>
<div id="recovery-flash"></div>
<div id="crosshair"></div>
<div id="enemy-labels-container"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // --- 1. 基本設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1a0e); scene.fog = new THREE.Fog(0x0b1a0e, 100, 1500);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 3000);
    camera.rotation.order = 'YXZ';
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff, 1.2));
    const moon = new THREE.DirectionalLight(0x00ffaa, 0.8);
    moon.position.set(100, 200, 100); scene.add(moon);

    // 地形
    function getHeight(x, z) { return Math.sin(x/200) * Math.cos(z/200) * 45; }
    const terrainGeo = new THREE.PlaneGeometry(3000, 3000, 64, 64);
    terrainGeo.rotateX(-Math.PI / 2);
    const verts = terrainGeo.attributes.position.array;
    for(let i=0; i<verts.length; i+=3) verts[i+1] = getHeight(verts[i], verts[i+2]);
    terrainGeo.computeVertexNormals();
    const terrain = new THREE.Mesh(terrainGeo, new THREE.MeshPhongMaterial({ color: 0x122612, flatShading: true }));
    scene.add(terrain);

    // 竹林
    for(let i=0; i<200; i++) {
        const b = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 2, 180, 6), new THREE.MeshPhongMaterial({ color: 0x142b14 }));
        const rx = (Math.random()-0.5)*1800, rz = (Math.random()-0.5)*1800;
        b.position.set(rx, getHeight(rx, rz)+90, rz); scene.add(b);
    }

    // --- 2. 敵の管理システム ---
    const enemies = [];
    const labelContainer = document.getElementById('enemy-labels-container');
    
    function createEnemy(x, z) {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.BoxGeometry(16, 32, 16), new THREE.MeshPhongMaterial({color: 0x222222})));
        g.add(new THREE.Mesh(new THREE.ConeGeometry(20, 12, 8), new THREE.MeshPhongMaterial({color: 0x333333})));
        g.children[1].position.y = 32; g.position.set(x, getHeight(x,z), z); scene.add(g);
        
        const l = document.createElement('div'); l.className = 'enemy-label';
        l.innerHTML = `<div style="color:white;font-size:10px;">ミニオン</div><div class="enemy-hp-bar"><div class="enemy-hp-fill" style="width:100%; height:100%; background:var(--pink);"></div></div>`;
        if (gameActive) l.style.display = 'block';
        labelContainer.appendChild(l);
        
        enemies.push({ mesh: g, label: l, hpFill: l.querySelector('.enemy-hp-fill'), hp: 100, alive: true, speed: 110, lastAtk: 0 });
    }

    // 初期の敵
    createEnemy(300, -300); createEnemy(-300, -400);

    // 武器モデル
    const sword = new THREE.Group();
    sword.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 8.5, 0.1), new THREE.MeshPhongMaterial({color: 0xcccccc})));
    sword.add(new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.5, 0.6), new THREE.MeshPhongMaterial({color: 0x222222})));
    sword.children[0].position.y = 4.5; sword.position.set(1.5, -1.8, -3.5); camera.add(sword);

    const shuriken = new THREE.Group();
    const shMat = new THREE.MeshPhongMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 0.6 });
    for(let i=0; i<4; i++){ const b = new THREE.Mesh(new THREE.BoxGeometry(0.4, 4.5, 0.1), shMat); b.rotation.z = (i*Math.PI)/2; shuriken.add(b); }
    shuriken.position.set(1.5, -1.2, -3); shuriken.rotation.x = Math.PI / 2; shuriken.visible = false;
    camera.add(shuriken); scene.add(camera);

    // --- 3. 操作・管理システム ---
    const controls = new PointerLockControls(camera, document.body);
    const overlay = document.getElementById('start-overlay'), hud = document.getElementById('game-hud');
    const guardUI = document.getElementById('guard-overlay'), flashUI = document.getElementById('attack-flash');
    const dmgFlashUI = document.getElementById('damage-flash'), recFlashUI = document.getElementById('recovery-flash');
    const mapContainer = document.getElementById('map-container'), mapCanvas = document.getElementById('map-canvas'), ctx = mapCanvas.getContext('2d');

    let playerHp = 100, recoveryCount = 2, isMapOpen = false, currentWeaponIndex = 1;
    let gameActive = false, startTime = 0, canAttack = true, isAttacking = false, isGuarding = false;
    let lastSpawnTime = 0; // スポーン管理用
    const cooldowns = [500, 1000, 800], projectiles = [];
    const moveState = { f: false, b: false, l: false, r: false }, velocity = new THREE.Vector3();
    let gamepadIndex = null, lastButtons = {}, canJump = false;

    function startGame() {
        if (gameActive && controls.isLocked) return;
        try { controls.lock(); } catch(e) {}
        camera.position.y = getHeight(camera.position.x, camera.position.z) + 20;
        overlay.style.display = 'none'; hud.style.display = 'block'; document.getElementById('crosshair').style.display='block';
        enemies.forEach(e => e.alive && (e.label.style.display = 'block'));
        if(!gameActive) { startTime = Date.now(); lastSpawnTime = startTime; gameActive = true; }
        updateStatusUI();
    }

    overlay.addEventListener('click', startGame);
    overlay.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); }, {passive: false});
    controls.addEventListener('unlock', () => { if(gameActive) overlay.style.display = 'flex'; });
    document.addEventListener('keydown', (e) => { if(e.code === 'KeyE') useRecovery(); if(e.code === 'KeyM') toggleMap(); });
    function toggleMap() { isMapOpen = !isMapOpen; mapContainer.style.display = isMapOpen ? 'block' : 'none'; }
    window.addEventListener("gamepadconnected", (e) => gamepadIndex = e.gamepad.index);

    function handleGamepad(delta, now) {
        if (gamepadIndex === null) return;
        const gp = navigator.getGamepads()[gamepadIndex]; if (!gp) return;
        if (gp.buttons[9].pressed && !lastButtons[9]) startGame();
        if (controls.isLocked || gameActive) {
            const dz = 0.15;
            const sX = Math.abs(gp.axes[0]) < dz ? 0 : gp.axes[0], sY = Math.abs(gp.axes[1]) < dz ? 0 : gp.axes[1];
            moveState.f = sY < 0; moveState.b = sY > 0; moveState.l = sX < 0; moveState.r = sX > 0;
            camera.rotation.y -= (Math.abs(gp.axes[2]) < dz ? 0 : gp.axes[2]) * 3.0 * delta;
            camera.rotation.x -= (Math.abs(gp.axes[3]) < dz ? 0 : gp.axes[3]) * 3.0 * delta;
            camera.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, camera.rotation.x)); camera.rotation.z = 0;
            if (gp.buttons[2].pressed && !lastButtons[2]) toggleMap();
            isGuarding = (gp.buttons[6].pressed || gp.buttons[6].value > 0.1) && !isAttacking;
            guardUI.style.display = isGuarding ? 'block' : 'none';
            if (gp.buttons[7].pressed && !lastButtons[7] && canAttack && !isGuarding) performAttack();
            if (gp.buttons[3].pressed && !lastButtons[3]) useRecovery();
            if (gp.buttons[5].pressed && !lastButtons[5]) { currentWeaponIndex = (currentWeaponIndex + 1) % 3; updateWepUI(); }
            if (gp.buttons[4].pressed && !lastButtons[4]) { currentWeaponIndex = (currentWeaponIndex + 2) % 3; updateWepUI(); }
            if (gp.buttons[0].pressed && canJump) { velocity.y = 130; canJump = false; }
        }
        gp.buttons.forEach((b, i) => lastButtons[i] = b.pressed);
    }

    // --- 4. スポーン・戦闘機能 ---
    function performAttack() {
        canAttack = false; isAttacking = true; flashUI.style.opacity = '0.3'; document.getElementById('crosshair').classList.add('attacking');
        const activeSlot = [document.getElementById('slot-0'), document.getElementById('slot-1'), document.getElementById('slot-2')][currentWeaponIndex];
        activeSlot.classList.add('cooldown');
        if (currentWeaponIndex === 1) { 
            sword.rotation.x = 1.0;
            enemies.forEach(e => { if(e.alive && camera.position.distanceTo(e.mesh.position) < 120) applyDamage(e, 30); }); 
        } else if (currentWeaponIndex === 0) fireShuriken();
        setTimeout(() => { isAttacking = false; flashUI.style.opacity = '0'; document.getElementById('crosshair').classList.remove('attacking'); sword.rotation.x = -0.2; }, 150);
        setTimeout(() => { canAttack = true; activeSlot.classList.remove('cooldown'); }, cooldowns[currentWeaponIndex]);
    }

    function spawnEnemyRoutine(now) {
        // 10秒ごとにスポーン
        if (now - lastSpawnTime > 10000) {
            lastSpawnTime = now;
            const dist = 600 + Math.random() * 200;
            const angle = Math.random() * Math.PI * 2;
            createEnemy(camera.position.x + Math.cos(angle) * dist, camera.position.z + Math.sin(angle) * dist);
        }
    }

    function useRecovery() { if (recoveryCount > 0 && playerHp < 100) { recoveryCount--; playerHp = Math.min(100, playerHp + 40); updateStatusUI(); recFlashUI.style.opacity = '0.4'; setTimeout(() => recFlashUI.style.opacity = '0', 500); } }
    function updateStatusUI() { document.getElementById('hp-bar').style.width = playerHp + "%"; document.getElementById('hp-text').innerText = Math.round(playerHp); document.getElementById('item-count').innerText = "x" + recoveryCount; }
    function applyDamage(e, amt) { e.hp = Math.max(0, e.hp - amt); e.hpFill.style.width = e.hp + "%"; if(e.hp <= 0){ e.alive = false; scene.remove(e.mesh); e.label.style.display = 'none'; } }
    function updateWepUI() { [document.getElementById('slot-0'), document.getElementById('slot-1'), document.getElementById('slot-2')].forEach((s, i) => s.classList.toggle('active', i === currentWeaponIndex)); sword.visible = (currentWeaponIndex === 1); shuriken.visible = (currentWeaponIndex === 0); document.getElementById('attack-pwr').innerText = [36, 124, 45][currentWeaponIndex]; }

    function updateAI(delta, now) {
        enemies.forEach(e => {
            if (!e.alive) return;
            const dist = camera.position.distanceTo(e.mesh.position);
            if (dist < 1000 && dist > 55) {
                const dir = new THREE.Vector3().subVectors(camera.position, e.mesh.position).normalize();
                e.mesh.position.x += dir.x * e.speed * delta; e.mesh.position.z += dir.z * e.speed * delta;
                e.mesh.position.y = getHeight(e.mesh.position.x, e.mesh.position.z);
                e.mesh.lookAt(camera.position.x, e.mesh.position.y, camera.position.z);
            }
            if (dist < 65 && now - e.lastAtk > 2000) {
                e.lastAtk = now;
                if (!isGuarding) {
                    playerHp = Math.max(0, playerHp - 10); updateStatusUI();
                    dmgFlashUI.style.opacity = '0.5'; setTimeout(() => dmgFlashUI.style.opacity = '0', 100);
                    if (playerHp <= 0) { playerHp = 100; updateStatusUI(); camera.position.set(0, 20, 0); }
                } else { flashUI.style.background = "var(--cyan)"; flashUI.style.opacity = '0.2'; setTimeout(() => { flashUI.style.opacity = '0'; flashUI.style.background = "white"; }, 100); }
            }
        });
    }

    function fireShuriken() {
        const p = shuriken.clone(); p.visible = true;
        const vec = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        p.position.copy(camera.position).add(vec.clone().multiplyScalar(5));
        p.quaternion.copy(camera.quaternion); p.rotation.x = Math.PI/2;
        scene.add(p); projectiles.push({ mesh: p, velocity: vec.multiplyScalar(500), life: 100 });
    }

    function drawMap() {
        if (!isMapOpen) return;
        const s = mapCanvas.clientWidth; mapCanvas.width = s; mapCanvas.height = s;
        const sc = s / 1500, cx = s / 2, cy = s / 2; ctx.clearRect(0, 0, s, s);
        ctx.fillStyle = "red"; enemies.forEach(e => { if (e.alive) ctx.beginPath(), ctx.arc(cx+(e.mesh.position.x-camera.position.x)*sc, cy+(e.mesh.position.z-camera.position.z)*sc, 8, 0, 7), ctx.fill(); });
        ctx.save(); ctx.translate(cx, cy); ctx.rotate(-camera.rotation.y); ctx.fillStyle = "#0f8"; ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(10,10); ctx.lineTo(-10,10); ctx.fill(); ctx.restore();
    }

    const ray = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 100);
    let prevTime = performance.now(), v3 = new THREE.Vector3();

    // --- 5. メインループ ---
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now(), delta = Math.min((time - prevTime) / 1000, 0.05);
        handleGamepad(delta, time);
        if (gameActive) {
            updateAI(delta, time);
            spawnEnemyRoutine(time);
        }
        if (isMapOpen) drawMap();

        if (gameActive && (controls.isLocked || gamepadIndex !== null)) {
            const rem = Math.max(0, 300 - Math.floor((time - startTime) / 1000));
            document.getElementById('timer-display').innerText = `${Math.floor(rem/60).toString().padStart(2,'0')}:${(rem%60).toString().padStart(2,'0')}`;
            velocity.x -= velocity.x * 10 * delta; velocity.z -= velocity.z * 10 * delta; velocity.y -= 9.8 * 40 * delta;
            const spd = isGuarding ? 500 : 1400;
            if (moveState.f) velocity.z -= spd * delta; if (moveState.b) velocity.z += spd * delta;
            if (moveState.l) velocity.x -= spd * delta; if (moveState.r) velocity.x += spd * delta;
            controls.moveForward(-velocity.z * delta); controls.moveRight(velocity.x * delta);
            camera.position.y += velocity.y * delta;
            ray.ray.origin.copy(camera.position).y += 20;
            const hit = ray.intersectObject(terrain);
            if (hit.length > 0) { const gY = hit[0].point.y + 20; if (camera.position.y <= gY) { velocity.y = 0; camera.position.y = gY; canJump = true; } }

            if (sword.visible && !isAttacking) { 
                if (isGuarding) { sword.position.lerp(new THREE.Vector3(0, -0.5, -2.5), 0.2); sword.rotation.z = Math.PI/4; }
                else { sword.position.lerp(new THREE.Vector3(1.5, -1.8, -3.5), 0.1); sword.rotation.z = 0; sword.position.y += Math.sin(time*0.002)*0.002; }
            }
            if (shuriken.visible) {
                if (isGuarding) shuriken.position.lerp(new THREE.Vector3(0, 0, -2.5), 0.2); 
                else { shuriken.position.lerp(new THREE.Vector3(1.5, -1.2, -3.2), 0.1); shuriken.rotation.y += 0.05; }
            }
            for (let i = projectiles.length-1; i >= 0; i--) {
                const p = projectiles[i]; p.mesh.position.add(p.velocity.clone().multiplyScalar(delta)); p.mesh.rotation.y += 0.8; p.life--;
                let hAny = false; enemies.forEach(e => { if (e.alive && p.mesh.position.distanceTo(e.mesh.position.clone().add(new THREE.Vector3(0,15,0))) < 25) { applyDamage(e, 10); hAny = true; } });
                if (hAny || p.life <= 0) { scene.remove(p.mesh); projectiles.splice(i, 1); }
            }
        }
        enemies.forEach(e => { if (e.alive) { v3.setFromMatrixPosition(e.mesh.matrixWorld); v3.y += 42; v3.project(camera); const x = (v3.x*0.5+0.5)*window.innerWidth, y = (v3.y*-0.5+0.5)*window.innerHeight; if (v3.z < 1) { e.label.style.display = gameActive ? 'block' : 'none'; e.label.style.left = `${x}px`; e.label.style.top = `${y}px`; } else e.label.style.display = 'none'; } });
        prevTime = time; renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
